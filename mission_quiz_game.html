<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在外公館 地域当てクイズ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f7ff;
    --surface: #ffffff;
    --surface2: #e8f2ff;
    --border: #bfdbfe;
    --text: #1e3a5f;
    --text-muted: #6490c0;
    --accent: #2563eb;
    --accent2: #7c3aed;
    --correct: #059669;
    --wrong: #dc2626;
    --warn: #d97706;
    --radius: 12px;
  }

  body {
    background: linear-gradient(135deg, #dbeafe 0%, #ede9fe 50%, #d1fae5 100%);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 700;
    letter-spacing: .03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  header p { font-size: 13px; color: var(--text-muted); }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 8px 32px rgba(37, 99, 235, 0.12);
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .stat-item { text-align: center; }
  .stat-label { color: var(--text-muted); font-size: 11px; margin-bottom: 2px; }
  .stat-val { font-size: 20px; font-weight: 700; }
  .stat-val.correct { color: var(--correct); }
  .stat-val.wrong   { color: var(--wrong); }
  .stat-val.streak  { color: var(--warn); }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 6px;
    background: #bfdbfe;
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .4s ease;
  }

  /* ── Question ── */
  .q-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q-mission {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 6px;
    color: var(--text);
  }
  .q-type {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 99px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  .q-type.大使館   { background: #dbeafe; color: #1d4ed8; }
  .q-type.総領事館 { background: #d1fae5; color: #065f46; }
  .q-type.窓口機関 { background: #fef3c7; color: #92400e; }

  .q-country {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .q-country span {
    background: #ede9fe;
    color: #6d28d9;
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .opt-btn {
    padding: 14px 10px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #dbeafe;
    transform: translateY(-1px);
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct-ans {
    border-color: var(--correct);
    background: #d1fae5;
    color: var(--correct);
  }
  .opt-btn.wrong-ans {
    border-color: var(--wrong);
    background: #fee2e2;
    color: var(--wrong);
  }

  /* ── Feedback ── */
  .feedback {
    min-height: 40px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    transition: opacity .2s;
  }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong   { color: var(--wrong); }

  /* ── Next button ── */
  .next-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #ffffff;
    display: none;
  }
  .next-btn:hover { opacity: .9; transform: translateY(-1px); }
  .next-btn.visible { display: block; }

  /* ── Start / Result screen ── */
  .screen {
    text-align: center;
    padding: 8px 0;
  }
  .screen h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .screen p { color: var(--text-muted); font-size: 14px; line-height: 1.7; margin-bottom: 20px; }

  .big-score {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    margin: 16px 0 4px;
  }
  .big-score .denom { font-size: 20px; color: var(--text-muted); font-weight: 500; }

  .rank {
    font-size: 13px;
    padding: 4px 14px;
    border-radius: 99px;
    display: inline-block;
    margin-bottom: 20px;
    font-weight: 600;
  }

  .start-btn, .restart-btn {
    display: inline-block;
    padding: 14px 36px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #ffffff;
    transition: all .15s;
  }
  .start-btn:hover, .restart-btn:hover { opacity: .9; transform: translateY(-1px); }

  .region-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .region-chk {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .region-chk:hover { border-color: var(--accent); color: var(--text); }
  .region-chk.checked {
    border-color: var(--accent);
    background: #dbeafe;
    color: var(--accent);
  }
  .region-chk .chk-icon {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
  }
  .region-chk.checked .chk-icon::after { content: '✓'; }
  .region-chk .cnt {
    margin-left: auto;
    font-size: 11px;
    opacity: .7;
  }
  .sel-all-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .sel-all-btn {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .sel-all-btn:hover { background: var(--surface2); color: var(--text); }

  /* ── Hint button ── */
  .hint-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px dashed #a78bfa;
    background: transparent;
    color: #7c3aed;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 18px;
  }
  .hint-btn:hover { background: #ede9fe; }
  .hint-btn:disabled { opacity: .4; cursor: default; }
  .hint-reveal {
    display: inline-block;
    background: #ede9fe;
    color: #6d28d9;
    padding: 3px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 18px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .breakdown {
    margin: 16px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    text-align: left;
  }
  .bd-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
  }
  .bd-region { color: var(--text-muted); margin-bottom: 3px; }
  .bd-score { font-size: 16px; font-weight: 700; }

  /* ── Result breakdown ── */
  .count-sel {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .count-btn {
    padding: 6px 16px;
    border-radius: 99px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .count-btn.active {
    border-color: var(--accent2);
    background: #ede9fe;
    color: var(--accent2);
  }

  /* ── Memo panel (post-answer note) ── */
  .memo-panel {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #78350f;
    line-height: 1.6;
    animation: fadeIn .25s ease;
    text-align: left;
  }
  .memo-panel .memo-label {
    font-size: 11px;
    font-weight: 700;
    color: #d97706;
    letter-spacing: .08em;
    margin-bottom: 4px;
  }

  /* ── Wrong list in result ── */
  .wrong-list {
    text-align: left;
    margin: 12px 0 20px;
  }
  .wrong-list-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--wrong);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wrong-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    gap: 8px;
  }
  .wrong-item .wi-name { font-weight: 600; color: var(--text); flex: 1; }
  .wrong-item .wi-ans  { color: var(--wrong); font-size: 11px; white-space: nowrap; }
  .wrong-item .wi-correct { color: var(--correct); font-size: 11px; white-space: nowrap; }

  /* ── Weak list mode button ── */
  .weak-btn {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #f87171;
    background: #fff1f2;
    color: #dc2626;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 10px;
    text-align: center;
  }
  .weak-btn:hover { background: #fee2e2; }
  .weak-btn .weak-cnt {
    font-size: 11px;
    background: #dc2626;
    color: #fff;
    padding: 1px 8px;
    border-radius: 99px;
    margin-left: 6px;
  }
  .weak-btn:disabled { opacity: .4; cursor: default; }

  /* ── Weak indicator on start ── */
  .weak-mode-banner {
    background: #fff1f2;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: #dc2626;
    font-weight: 600;
    margin-bottom: 14px;
    display: none;
  }

  /* ── Result buttons row ── */
  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .streak-badge {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--warn);
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 99px;
    opacity: 0;
    transform: translateY(-10px);
    transition: all .3s;
    pointer-events: none;
    box-shadow: 0 4px 12px rgba(217,119,6,.4);
  }
  .streak-badge.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🌏 在外公館 地域当てクイズ</h1>
  <p>公館名からどの地域か選んでみよう！</p>
</header>

<div class="card" id="main-card">
  <!-- Start screen -->
  <div class="screen" id="start-screen">
    <h2>ゲーム開始</h2>
    <p>日本の在外公館名を見て、<br>正しい地域を選んでください。</p>

    <div class="weak-mode-banner" id="weak-banner"></div>
    <button class="weak-btn" id="weak-mode-btn" disabled>
      📕 苦手リスト集中モード<span class="weak-cnt" id="weak-cnt">0</span>
    </button>

    <div style="margin-bottom:10px;font-size:12px;color:var(--text-muted);font-weight:600">出題する地域を選択</div>
    <div class="sel-all-row">
      <button class="sel-all-btn" id="sel-all">すべて選択</button>
      <button class="sel-all-btn" id="sel-none">すべて解除</button>
    </div>
    <div class="region-select" id="region-select"></div>

    <div style="margin-bottom:10px;font-size:12px;color:var(--text-muted);font-weight:600">問題数</div>
    <div class="count-sel">
      <button class="count-btn" data-count="10">10問</button>
      <button class="count-btn active" data-count="20">20問</button>
      <button class="count-btn" data-count="30">30問</button>
      <button class="count-btn" data-count="999">全問</button>
    </div>

    <div id="start-error" style="color:var(--wrong);font-size:13px;margin-bottom:12px;display:none">地域を1つ以上選択してください</div>
    <button class="start-btn" id="start-btn">スタート！</button>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen" style="display:none">
    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">正解</div>
        <div class="stat-val correct" id="s-correct">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">不正解</div>
        <div class="stat-val wrong" id="s-wrong">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">問題</div>
        <div class="stat-val" id="s-num" style="color:var(--accent)">1/20</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">連続正解</div>
        <div class="stat-val streak" id="s-streak">0</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="q-label">この公館が属する地域は？</div>
    <div class="q-mission" id="q-mission">—</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:0">
      <span class="q-type" id="q-type"></span>
      <button class="hint-btn" id="hint-btn" style="display:none">💡 ヒント（国名）</button>
    </div>
    <div id="hint-reveal" style="display:none" class="hint-reveal"></div>

    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="memo-panel" id="memo-panel" style="display:none">
      <div class="memo-label">📌 豆知識</div>
      <div id="memo-text"></div>
    </div>
    <button class="next-btn" id="next-btn">次の問題 →</button>
  </div>

  <!-- Result screen -->
  <div class="screen" id="result-screen" style="display:none">
    <h2>クイズ終了！</h2>
    <div class="big-score">
      <span id="r-score">0</span><span class="denom"> / <span id="r-total">20</span></span>
    </div>
    <div class="rank" id="r-rank"></div>
    <p id="r-comment"></p>
    <div class="breakdown" id="r-breakdown"></div>
    <div class="wrong-list" id="wrong-list" style="display:none">
      <div class="wrong-list-title">❌ 間違えた公館</div>
      <div id="wrong-items"></div>
    </div>
    <div class="result-btns">
      <button class="restart-btn" id="restart-btn">もう一度遊ぶ</button>
      <button class="weak-btn" id="result-weak-btn" style="display:none">
        📕 苦手リストで再挑戦<span class="weak-cnt" id="result-weak-cnt">0</span>
      </button>
    </div>
  </div>
</div>

<div class="streak-badge" id="streak-badge">🔥 連続正解！</div>

<script>
const data = {
  "アジア": [
    {name:"アフガニスタン大使館",type:"大使館",country:"",note:"アフガニスタンは中央アジアと南アジアの接点に位置し、日本はカブールに大使館を置く。"},
    {name:"インド大使館",type:"大使館",country:"",note:"インドは人口世界最多の民主主義国家。日本との関係は「特別戦略的グローバル・パートナーシップ」と位置付けられている。"},
    {name:"コルカタ総領事館",type:"総領事館",country:"インド",note:"コルカタ（旧カルカッタ）はインド東部の大都市。かつてインド大反乱（1857年）以前のイギリス領インドの首都だった。"},
    {name:"チェンナイ総領事館",type:"総領事館",country:"インド",note:"チェンナイはインド南部の主要都市で、日系自動車メーカーの工場が集積する「インドのデトロイト」とも呼ばれる。"},
    {name:"ベンガルール総領事館",type:"総領事館",country:"インド",note:"ベンガルール（バンガロール）はインドのIT産業の中心地で「インドのシリコンバレー」と呼ばれる。"},
    {name:"ムンバイ総領事館",type:"総領事館",country:"インド",note:"ムンバイはインド最大の経済都市で、ボリウッド映画産業の拠点。旧名はボンベイ。"},
    {name:"インドネシア大使館",type:"大使館",country:"",note:"インドネシアは約1万7000の島々からなる世界最大の島嶼国家。人口は約2億7000万人でASEAN最大。"},
    {name:"スラバヤ総領事館",type:"総領事館",country:"インドネシア",note:"スラバヤはジャワ島東部の港湾都市で、インドネシア第2の都市。独立戦争の激戦地として英雄の都とも呼ばれる。"},
    {name:"デンパサール総領事館",type:"総領事館",country:"インドネシア",note:"デンパサールはバリ島の州都。観光地として有名なバリ島では日本人旅行者も多く、領事的業務の需要が高い。"},
    {name:"メダン総領事館",type:"総領事館",country:"インドネシア",note:"メダンはスマトラ島北部の都市でインドネシア第3の都市。東南アジア有数のタバコ産業の中心地。"},
    {name:"カンボジア大使館",type:"大使館",country:"",note:"カンボジアにはアンコールワット遺跡群がある。日本はカンボジア最大の援助国の一つで、国連平和維持活動（PKO）でも支援した。"},
    {name:"韓国大使館",type:"大使館",country:"",note:"韓国は日本と最も近い隣国のひとつ。朝鮮半島では唯一日本が国家承認している。"},
    {name:"釜山総領事館",type:"総領事館",country:"韓国",note:"釜山は韓国第2の都市で最大の港湾都市。日韓フェリーが就航しており、福岡からのアクセスも良好。"},
    {name:"済州総領事館",type:"総領事館",country:"韓国",note:"済州島は韓国最大の島で観光地として有名。日本人旅行者も多く訪れるリゾート地。"},
    {name:"中国大使館",type:"大使館",country:"",note:"中国は日本最大の貿易相手国。国交正常化は1972年で、在外公館数は日本の中で最も多い国のひとつ。"},
    {name:"上海総領事館",type:"総領事館",country:"中国",note:"上海は中国最大の経済都市。日本人居留者が多く、日本の総領事館が管轄する管区内に多くの日系企業が進出している。"},
    {name:"広州総領事館",type:"総領事館",country:"中国",note:"広州は中国南部の経済中心地。広東省の省都で、珠江デルタ地帯の製造業の中心として日系企業も多く進出している。"},
    {name:"成都総領事館",type:"総領事館",country:"中国",note:"成都は四川省の省都で中国西部の経済・文化の中心地。パンダの保護で有名な成都ジャイアントパンダ繁育研究基地がある。"},
    {name:"沈陽総領事館",type:"総領事館",country:"中国",note:"瀋陽は遼寧省の省都で旧満州の中心都市。日本の旧満州国との歴史的関係が深い。"},
    {name:"重慶総領事館",type:"総領事館",country:"中国",note:"重慶は長江上流の直轄市で中国最大の行政区。「山の都」とも呼ばれる急峻な地形が特徴。"},
    {name:"スリランカ大使館",type:"大使館",country:"",note:"スリランカはインド洋の島国。かつてセイロンと呼ばれ、日本との関係は戦後賠償問題でのセイロン演説で知られる。"},
    {name:"タイ大使館",type:"大使館",country:"",note:"タイは東南アジアで唯一植民地支配を受けなかった国。日本との関係は1887年に始まり、日系製造業の主要拠点。"},
    {name:"チェンマイ総領事館",type:"総領事館",country:"タイ",note:"チェンマイはタイ北部最大の都市で「北方のバラ」と呼ばれる。日本人の長期滞在者・移住者が多い観光都市。"},
    {name:"日本台湾交流協会台北事務所",type:"窓口機関",country:"台湾",note:"日本は台湾を国家承認していないため、大使館の代わりに「日本台湾交流協会」が窓口機関として機能している。"},
    {name:"タジキスタン大使館",type:"大使館",country:"",note:"タジキスタンは中央アジアで唯一ペルシャ語系の言語を公用語とする国。9割が山岳地帯で「中央アジアの屋根」とも呼ばれる。"},
    {name:"カザフスタン大使館",type:"大使館",country:"",note:"カザフスタンは中央アジア最大の国で世界第9位の面積を持つ。資源大国であり、日本との経済関係も深い。"},
    {name:"ネパール大使館",type:"大使館",country:"",note:"ネパールにはエベレスト（サガルマータ）をはじめ世界最高峰の山が集中する。登山・トレッキングで日本人にも人気が高い。"},
    {name:"パキスタン大使館",type:"大使館",country:"",note:"パキスタンは核保有国で、インドと領土問題を抱えている。カラコルム・ハイウェイで中国と結ばれる戦略的要地。"},
    {name:"カラチ総領事館",type:"総領事館",country:"パキスタン",note:"カラチはパキスタン最大の都市で経済の中心地。かつては首都だったが、現在の首都はイスラマバード。"},
    {name:"バングラデシュ大使館",type:"大使館",country:"",note:"バングラデシュは衣料品輸出で世界第2位。日本はダッカに大使館を置き、インフラ整備でも支援を続けている。"},
    {name:"フィリピン大使館",type:"大使館",country:"",note:"フィリピンは約7600の島々からなる島嶼国家。英語が公用語のひとつで、日本には多くのフィリピン人労働者が在住している。"},
    {name:"セブ総領事館",type:"総領事館",country:"フィリピン",note:"セブ島はフィリピン中部ビサヤ地方の中心で、マゼランが1521年に到達した歴史の地。リゾートとしても有名。"},
    {name:"ダバオ総領事館",type:"総領事館",country:"フィリピン",note:"ダバオはミンダナオ島最大の都市。バナナなどの農産物の輸出拠点で、日系農業企業も多い。"},
    {name:"ブータン大使館",type:"大使館",country:"",note:"ブータンは国民総幸福量（GNH）を掲げる仏教国。日本と国交を持たない時期が長かったが、2023年に国交が樹立された。"},
    {name:"ブルネイ大使館",type:"大使館",country:"",note:"ブルネイはボルネオ島北部の絶対王政の国。石油・天然ガス資源に富み、一人あたりGDPはアジア有数の高水準。"},
    {name:"ベトナム大使館",type:"大使館",country:"",note:"ベトナムは日本の最大のODA受入国のひとつ。近年は日系製造業の進出が相次ぎ、「第2の中国」とも呼ばれる。"},
    {name:"ホーチミン総領事館",type:"総領事館",country:"ベトナム",note:"ホーチミン市はベトナム最大の都市で経済の中心地。旧名サイゴン。日系企業の進出が多く、日本人居住者も多い。"},
    {name:"モルディブ大使館",type:"大使館",country:"",note:"モルディブはインド洋に浮かぶ約1200の島からなる国。平均海抜1.5mで海面上昇の脅威にさらされている。"},
    {name:"モンゴル大使館",type:"大使館",country:"",note:"モンゴルは世界最大の内陸国。日本との関係は深く、相撲の横綱・大関を多数輩出している国でもある。"},
    {name:"ミャンマー大使館",type:"大使館",country:"",note:"ミャンマーは2021年の軍事クーデター後、政情が不安定。日本はミャンマーへの最大の援助供与国のひとつ。"},
    {name:"ラオス大使館",type:"大使館",country:"",note:"ラオスは東南アジア唯一の内陸国。「百万頭の象の国」とも呼ばれ、メコン川が国土を縦断する。"},
    {name:"マレーシア大使館",type:"大使館",country:"",note:"マレーシアはルックイースト政策で日本を手本に発展を遂げた。首相マハティール氏の提唱で日本の製造業を積極的に誘致した。"},
    {name:"コタキナバル総領事館",type:"総領事館",country:"マレーシア",note:"コタキナバルはボルネオ島北部・サバ州の州都。世界遺産のキナバル山がある自然豊かなリゾート地域。"},
    {name:"シンガポール大使館",type:"大使館",country:"",note:"シンガポールは面積が東京都より小さい都市国家ながら、一人あたりGDPは世界トップクラスのアジアの金融ハブ。"},
    {name:"キルギス大使館",type:"大使館",country:"",note:"キルギスは中央アジアの山岳国家。「中央アジアのスイス」とも呼ばれ、天山山脈が国土の大部分を占める。"},
    {name:"トルクメニスタン大使館",type:"大使館",country:"",note:"トルクメニスタンは世界有数の天然ガス埋蔵量を持つ。「地獄の門」と呼ばれる火炎クレーターが有名な観光地。"},
    {name:"ウズベキスタン大使館",type:"大使館",country:"",note:"ウズベキスタンはサマルカンドなどシルクロードの交易都市を持つ。人口は中央アジア最多で綿花の産地としても知られる。"},

    {name:"オーストラリア大使館",type:"大使館",country:"",note:"オーストラリアは日本の最大の石炭・鉄鉱石輸入先。日本との経済安全保障上の重要性が増しており「準同盟」的関係にある。"},
    {name:"シドニー総領事館",type:"総領事館",country:"オーストラリア",note:"シドニーはオーストラリア最大の都市だが首都はキャンベラ。オペラハウスとハーバーブリッジで世界的に有名。"},
    {name:"メルボルン総領事館",type:"総領事館",country:"オーストラリア",note:"メルボルンはオーストラリア第2の都市で文化・教育の中心地。全豪オープンテニスの開催地として知られる。"},
    {name:"ブリスベン総領事館",type:"総領事館",country:"オーストラリア",note:"ブリスベンはクイーンズランド州の州都。2032年夏季オリンピックの開催地に決定している。"},
    {name:"パース総領事館",type:"総領事館",country:"オーストラリア",note:"パースは世界で最も孤立した大都市のひとつ。鉄鉱石・LNGの産出地に近く、日本との資源貿易の窓口でもある。"},
    {name:"フィジー大使館",type:"大使館",country:"",note:"フィジーは南太平洋の島嶼国家で約330の島からなる。太平洋島嶼フォーラムの本部が置かれている。"},
    {name:"キリバス大使館",type:"大使館",country:"",note:"キリバスは日付変更線をまたぐ国で、地球上で最初に新年を迎える国のひとつ。海面上昇で国土が水没する危機にある。"},
    {name:"サモア大使館",type:"大使館",country:"",note:"サモアは「南海の楽園」とも呼ばれるポリネシアの国。かつて西サモアと呼ばれ、国際日付変更線の西側に位置する。"},
    {name:"ソロモン諸島大使館",type:"大使館",country:"",note:"ソロモン諸島は太平洋戦争の激戦地ガダルカナル島を含む。2022年に中国と安全保障協定を締結し注目を集めた。"},
    {name:"ニュージーランド大使館",type:"大使館",country:"",note:"ニュージーランドは羊の数が人口の約5倍。先住民マオリ文化が根付き、「ロード・オブ・ザ・リング」の撮影地でも有名。"},
    {name:"オークランド総領事館",type:"総領事館",country:"ニュージーランド",note:"オークランドはニュージーランド最大の都市だが、首都はウェリントン。太平洋有数のポリネシア系住民の集積地。"},
    {name:"パプアニューギニア大使館",type:"大使館",country:"",note:"パプアニューギニアは世界で最も多くの言語（約840言語）が話される国。太平洋戦争でも重要な戦場になった。"},
    {name:"パラオ大使館",type:"大使館",country:"",note:"パラオはかつて日本の委任統治領で日本語由来の言葉が多く残る。世界有数のダイビングスポットとして有名。"},
    {name:"バヌアツ大使館",type:"大使館",country:"",note:"バヌアツはメラネシアの島嶼国。世界幸福度指数で上位に入ることが多く、カバ（伝統的飲料）文化で知られる。"},
    {name:"マーシャル諸島大使館",type:"大使館",country:"",note:"マーシャル諸島は第二次大戦後に米国の核実験が行われたビキニ環礁を含む。日本の漁船「第五福竜丸」も被曝した。"},
    {name:"ミクロネシア連邦大使館",type:"大使館",country:"",note:"ミクロネシア連邦はかつて日本の委任統治領。ヤップ島の石貨（大きな石の貨幣）が有名な文化として知られる。"},
    {name:"トンガ大使館",type:"大使館",country:"",note:"トンガは太平洋で唯一の君主国。ラグビーが盛んで、日本ラグビーにも多くのトンガ出身選手が貢献している。"},
    {name:"ツバル大使館",type:"大使館",country:"",note:"ツバルは海抜最高点が5mの国で、温暖化による海面上昇で数十年以内に水没するとも言われる。"},
    {name:"ナウル大使館",type:"大使館",country:"",note:"ナウルは世界最小の島嶼国家のひとつ。かつてリン鉱石の採掘で富裕国だったが、現在は資源が枯渇し経済的困難に直面。"},

  "北米": [
    {name:"アメリカ合衆国大使館",type:"大使館",country:"",note:"米国は日本の最大の同盟国。日米安全保障条約に基づき約5万人の米軍が日本に駐留している。"},
    {name:"アトランタ総領事館",type:"総領事館",country:"米国",note:"アトランタはジョージア州の州都で、コカ・コーラ発祥の地。1996年夏季オリンピックの開催都市でもある。"},
    {name:"アンカレジ総領事館",type:"総領事館",country:"米国",note:"アンカレジはアラスカ州最大の都市。日本との最短航空路上に位置し、かつては日欧便の中継地として栄えた。"},
    {name:"シカゴ総領事館",type:"総領事館",country:"米国",note:"シカゴはイリノイ州最大の都市でアメリカ第3の都市。「風の街」の愛称で知られ、ブルース・ジャズ音楽の発祥地。"},
    {name:"シアトル総領事館",type:"総領事館",country:"米国",note:"シアトルはワシントン州最大の都市でアマゾン・マイクロソフトなどIT企業の本拠地。太平洋岸に近く日本との繋がりも深い。"},
    {name:"デトロイト総領事館",type:"総領事館",country:"米国",note:"デトロイトはミシガン州最大の都市で「モーターシティ」の異名を持つ自動車産業の中心地。日系自動車メーカーとも深い関係。"},
    {name:"ニューヨーク総領事館",type:"総領事館",country:"米国",note:"ニューヨークには国連本部があり、日本の国連代表部も置かれている。在米日本人が最も多く居住する都市。"},
    {name:"ポートランド総領事館",type:"総領事館",country:"米国",note:"ポートランドはオレゴン州最大の都市。環境政策・持続可能な都市計画の先進地として世界的に注目される。"},
    {name:"ホノルル総領事館",type:"総領事館",country:"米国",note:"ホノルルはハワイ州の州都。日系移民の歴史が深く、真珠湾攻撃（1941年）の地でもある。"},
    {name:"ボストン総領事館",type:"総領事館",country:"米国",note:"ボストンはマサチューセッツ州の州都でハーバード・MITなど世界屈指の大学が集中するアカデミアの都。"},
    {name:"ロサンゼルス総領事館",type:"総領事館",country:"米国",note:"ロサンゼルスは在米日本人・日系人が最も多く住む都市のひとつ。ハリウッド映画産業と日本のエンタメの結びつきも深い。"},
    {name:"サンフランシスコ総領事館",type:"総領事館",country:"米国",note:"サンフランシスコはシリコンバレーの玄関口。1951年にサンフランシスコ講和条約が締結され、日本が独立を回復した地。"},
    {name:"デンバー総領事館",type:"総領事館",country:"米国",note:"デンバーはコロラド州の州都で標高約1600mの「マイルハイシティ」。日本の農業技術を活かした日系農業の歴史がある。"},
    {name:"ナッシュビル総領事館",type:"総領事館",country:"米国",note:"ナッシュビルはテネシー州の州都でカントリー音楽の聖地。近年は日本の自動車メーカーの南部工場との関係から総領事館が設置された。"},
    {name:"カナダ大使館",type:"大使館",country:"",note:"カナダは世界第2位の面積を持つ国。日本にとって重要な資源供給国であり、日系カナダ人（日系移民の子孫）も多く在住する。"},
    {name:"トロント総領事館",type:"総領事館",country:"カナダ",note:"トロントはカナダ最大の都市。世界で最も多様な民族が住む都市のひとつで、在カナダ日本人の最多居住地。"},
    {name:"バンクーバー総領事館",type:"総領事館",country:"カナダ",note:"バンクーバーはブリティッシュコロンビア州最大の都市で、太平洋に面した日本との関係が深い港湾都市。"},
    {name:"カルガリー総領事館",type:"総領事館",country:"カナダ",note:"カルガリーはアルバータ州最大の都市で石油産業の中心地。毎年7月にカルガリースタンピードという世界最大のロデオ祭が開かれる。"},

  "中南米": [
    {name:"アルゼンチン大使館",type:"大使館",country:"",note:"アルゼンチンには約5万人の日系人が居住。タンゴ発祥の地でもあり、大豆・牛肉の一大産地。"},
    {name:"アンティグア・バーブーダ大使館",type:"大使館",country:"",note:"アンティグア・バーブーダはカリブ海の小島嶼国。365の浜辺があるとも言われるリゾート地。"},

    {name:"エクアドル大使館",type:"大使館",country:"",note:"エクアドルはガラパゴス諸島を領有する赤道直下の国。バナナの主要輸出国で、生物多様性の宝庫。"},

    {name:"セントビンセント・グレナディーン大使館",type:"大使館",country:"",note:"セントビンセント・グレナディーンはカリブ海の島嶼国。映画「パイレーツ・オブ・カリビアン」の撮影地としても有名。"},
    {name:"セントルシア大使館",type:"大使館",country:"",note:"セントルシアはカリブ海東部の島国。ノーベル文学賞・経済学賞の受賞者を輩出した国として知られる。"},
    {name:"チリ大使館",type:"大使館",country:"",note:"チリは南北約4300kmに及ぶ世界最細長の国。銅の埋蔵・産出量は世界最大で、日本の銅輸入国としても重要。"},
    {name:"ドミニカ共和国大使館",type:"大使館",country:"",note:"ドミニカ共和国はカリブ海最大の島イスパニョーラ島の東部を占める。野球が国民的スポーツでMLB選手も多く輩出。"},
    {name:"ドミニカ国大使館",type:"大使館",country:"",note:"ドミニカ国（コモンウェルス・オブ・ドミニカ）はドミニカ共和国とは別の国。カリブ海の「自然の島」として生態系が豊か。"},
    {name:"トリニダード・トバゴ大使館",type:"大使館",country:"",note:"トリニダード・トバゴはカリブ海南部の島国で、スチールパン（スティールドラム）発祥の地。石油・天然ガスが豊富。"},
    {name:"ニカラグア大使館",type:"大使館",country:"",note:"ニカラグアは中央アメリカ最大の面積を持つ国。「湖の国」とも呼ばれ、2つの大きな湖（マナグア湖・ニカラグア湖）がある。"},
    {name:"ハイチ大使館",type:"大使館",country:"",note:"ハイチは西半球で最初に独立した黒人共和国（1804年）。たびたび大地震に見舞われ、日本はODAや人道支援を行っている。"},
    {name:"パナマ大使館",type:"大使館",country:"",note:"パナマはパナマ運河で知られる交通の要衝。中米と南米を結ぶ地峡国で、世界の海上貿易の約5%がこの運河を通る。"},
    {name:"パラグアイ大使館",type:"大使館",country:"",note:"パラグアイには約7000人の日系人が暮らし、農業分野で活躍。南米内陸部に位置し、二言語国家（スペイン語・グアラニー語）でもある。"},
    {name:"バルバドス大使館",type:"大使館",country:"",note:"バルバドスはカリブ海の小島国でラム酒とクリケットで有名。2021年に英連邦の王国から共和国へ移行した。"},
    {name:"ブラジル大使館",type:"大使館",country:"",note:"ブラジルには日本国外最多の約150万人の日系人が在住。1908年に笠戸丸で最初の移民が到着し、日系農業が発展した。"},
    {name:"クリチバ総領事館",type:"総領事館",country:"ブラジル",note:"クリチバはパラナ州の州都で、都市計画・公共交通・環境政策の先進都市として世界的に評価が高い。日系人も多く居住。"},
    {name:"サンパウロ総領事館",type:"総領事館",country:"ブラジル",note:"サンパウロはブラジル最大の都市で南米最大の経済都市。在外日系人最多のリベルダージ地区は「日本人街」として有名。"},
    {name:"リオデジャネイロ総領事館",type:"総領事館",country:"ブラジル",note:"リオデジャネイロは「驚異の街」とも呼ばれ、カーニバルとサンバの本場。2016年に南米初の夏季オリンピックが開催された。"},
    {name:"マナウス総領事館",type:"総領事館",country:"ブラジル",note:"マナウスはアマゾン川沿いの都市。アマゾン奥地にありながら、日本の電機メーカーが進出した「マナウス自由貿易地区」がある。"},
    {name:"レシフェ総領事館",type:"総領事館",country:"ブラジル",note:"レシフェはブラジル北東部ペルナンブコ州の州都。多くの橋があることから「ブラジルのベネチア」とも呼ばれる。"},
    {name:"ベネズエラ大使館",type:"大使館",country:"",note:"ベネズエラは世界最大の石油埋蔵量を誇るが、政治経済の混乱で大規模な人口流出が続いている。"},
    {name:"ベリーズ大使館",type:"大使館",country:"",note:"ベリーズは中米唯一の英語公用語国（旧英領ホンジュラス）。グレートブルーホールなど世界有数のダイビングスポットがある。"},
    {name:"ペルー大使館",type:"大使館",country:"",note:"ペルーにはインカ帝国の遺跡マチュピチュがある。日系人の多い国で元大統領フジモリ氏は日本人の両親を持つ。"},
    {name:"ボリビア大使館",type:"大使館",country:"",note:"ボリビアは世界最高所の行政首都スクレ・事実上の首都ラパスを持つ内陸国。ウユニ塩湖は世界最大の塩原として有名。"},
    {name:"ホンジュラス大使館",type:"大使館",country:"",note:"ホンジュラスは中米に位置し、マヤ遺跡コパンで知られる。バナナ共和国という言葉の語源となった国のひとつ。"},
    {name:"メキシコ大使館",type:"大使館",country:"",note:"メキシコはアステカ・マヤなど古代文明の地。日本との経済連携協定（EPA）は2005年に発効し、日系製造業が多く進出。"},
    {name:"グアダラハラ総領事館",type:"総領事館",country:"メキシコ",note:"グアダラハラはハリスコ州の州都でメキシコ第2の都市。テキーラ発祥の地ハリスコ州にあり、IT産業の集積地「シリコンバレー・メキシコ」とも呼ばれる。"},
    {name:"キューバ大使館",type:"大使館",country:"",note:"キューバはカリブ海最大の島国。日系キューバ人の歴史もあり、野球大国としても知られる。"},
  ],
  "欧州": [
    {name:"アイスランド大使館",type:"大使館",country:"",note:"アイスランドは北大西洋の島国で火山と氷河の国。世界最古の議会（アルシング）を持ち、オーロラ観察の名所。"},
    {name:"アイルランド大使館",type:"大使館",country:"",note:"アイルランドはケルト文化の国でギネスビールの発祥地。多くのIT・製薬企業の欧州本社が置かれるビジネスハブ。"},
    {name:"アゼルバイジャン大使館",type:"大使館",country:"",note:"アゼルバイジャンはカスピ海に面した産油国で「炎の国」とも呼ばれる。首都バクーには炎をモチーフにした高層ビルがある。"},
    {name:"アルバニア大使館",type:"大使館",country:"",note:"アルバニアはバルカン半島西部の国でかつて世界で唯一無神論を国家方針にした国。NATO加盟国で現在はEU加盟を目指している。"},
    {name:"アルメニア大使館",type:"大使館",country:"",note:"アルメニアは世界最初にキリスト教を国教とした国（301年）。コーカサス山脈の南に位置し、アルメニア人虐殺の歴史でも知られる。"},
    {name:"イタリア大使館",type:"大使館",country:"",note:"イタリアは日本と同じく第二次大戦の枢軸国。ローマ・フィレンツェ・ヴェネツィアなど世界遺産が世界最多クラスの文化大国。"},
    {name:"ミラノ総領事館",type:"総領事館",country:"イタリア",note:"ミラノはイタリア北部の経済・ファッションの都。世界最大のファッションウィークのひとつが開催され、多くの日系ファッション企業もある。"},
    {name:"バチカン大使館",type:"大使館",country:"",note:"バチカンは世界最小の国家（約0.44km²）でカトリック教会の総本山。日本はバチカンと正式な外交関係を維持している。"},
    {name:"ウクライナ大使館",type:"大使館",country:"",note:"ウクライナは欧州最大の面積を持つ国のひとつ。2022年のロシアによる全面侵攻後、日本もG7の一員として支援を続けている。"},
    {name:"英国大使館",type:"大使館",country:"",note:"英国（グレートブリテン及び北アイルランド連合王国）は日本の重要なパートナー。日英同盟（1902年）は日本初の対等な軍事同盟だった。"},
    {name:"エジンバラ総領事館",type:"総領事館",country:"英国",note:"エジンバラはスコットランドの首都。毎年夏に世界最大の芸術祭「エジンバラ・フリンジ・フェスティバル」が開催される。"},
    {name:"エストニア大使館",type:"大使館",country:"",note:"エストニアはバルト三国のひとつで電子政府の先進国。行政手続きの99%がオンライン化されており「デジタル国家」の代名詞。"},
    {name:"オーストリア大使館",type:"大使館",country:"",note:"オーストリアはウィーン・フィルハーモニーやオペラで知られる音楽の国。国際機関が集まる「第4の国連都市」でもある。"},
    {name:"オランダ大使館",type:"大使館",country:"",note:"オランダは江戸時代に出島を通じて日本と唯一交流を続けた欧州の国。「鎖国」時代の日本との外交的・文化的影響は大きい。"},
    {name:"北マケドニア大使館",type:"大使館",country:"",note:"北マケドニアは2019年に国名を「マケドニア」から変更した。ギリシャとの国名問題が解決し、NATOに加盟した。"},
    {name:"キプロス大使館",type:"大使館",country:"",note:"キプロスは地中海東部の島国でアフロディーテ生誕の地とされる。南北に分断された状態が続いており複雑な政治状況にある。"},
    {name:"ギリシャ大使館",type:"大使館",country:"",note:"ギリシャは西洋文明・民主主義の発祥地。オリンピックの発祥地でもあり、日本の柔道・相撲も古代ギリシャ競技との共通点が指摘される。"},
    {name:"クロアチア大使館",type:"大使館",country:"",note:"クロアチアはアドリア海に面した観光大国。ドブロヴニクは「アドリア海の真珠」と呼ばれ、ゲーム・オブ・スローンズの撮影地としても有名。"},
    {name:"コソボ大使館",type:"大使館",country:"",note:"コソボは2008年にセルビアから独立を宣言した欧州最新の国のひとつ。日本はコソボを国家承認している。"},
    {name:"ジョージア大使館",type:"大使館",country:"",note:"ジョージア（グルジア）はコーカサス地方の国でワインの起源地とされる。世界遺産を多く持ち、近年観光地として注目されている。"},
    {name:"スイス大使館",type:"大使館",country:"",note:"スイスは永世中立国で国連・赤十字など国際機関の本部が多数置かれる。時計・チョコレート・チーズで有名な多言語国家。"},
    {name:"スウェーデン大使館",type:"大使館",country:"",note:"スウェーデンはノーベル賞の創設国。IKEA・ABBA・エリクソンなど世界的企業を生み出した北欧デザインの中心地。"},
    {name:"スペイン大使館",type:"大使館",country:"",note:"スペインは1549年のフランシスコ・ザビエル来日以降、日本と長い関係を持つ。フラメンコ・闘牛・ガウディ建築で知られる。"},
    {name:"バルセロナ総領事館",type:"総領事館",country:"スペイン",note:"バルセロナはカタルーニャ州の州都でスペイン第2の都市。ガウディのサグラダ・ファミリアや1992年夏季オリンピックで有名。"},
    {name:"スロバキア大使館",type:"大使館",country:"",note:"スロバキアはチェコスロバキアが1993年に平和的に分離（ビロード離婚）して誕生した国。自動車生産が盛んな中欧の工業国。"},
    {name:"スロベニア大使館",type:"大使館",country:"",note:"スロベニアは旧ユーゴスラビアの国の中で最初にEUに加盟した国。首都リュブリャナは緑豊かで「欧州の環境首都」にも選ばれた。"},
    {name:"セルビア大使館",type:"大使館",country:"",note:"セルビアはバルカン半島の内陸国。ニコラ・テスラの出身地として知られ、テニスの王者ノバク・ジョコビッチの故郷でもある。"},
    {name:"チェコ大使館",type:"大使館",country:"",note:"チェコはビールの消費量が一人あたり世界最多の国。首都プラハは「黄金の都」と呼ばれ、第二次大戦の戦火を逃れた美しい旧市街が残る。"},
    {name:"デンマーク大使館",type:"大使館",country:"",note:"デンマークはグリーンランドとフェロー諸島を領有する北欧の小国。LEGOと人魚姫の像、アンデルセンの童話で有名。"},
    {name:"ドイツ大使館",type:"大使館",country:"",note:"ドイツはかつて日本と日独伊三国同盟を結んだ枢軸国。現在はEU最大の経済大国で、日独間の経済・文化交流は非常に活発。"},
    {name:"デュッセルドルフ総領事館",type:"総領事館",country:"ドイツ",note:"デュッセルドルフはノルトライン・ヴェストファーレン州の州都。在独日本人が最も多く集まる都市で「ライン川のリトル東京」とも呼ばれる。"},
    {name:"ハンブルク総領事館",type:"総領事館",country:"ドイツ",note:"ハンブルクはドイツ第2の都市で「自由ハンザ都市」とも呼ばれる港湾都市。ビートルズが音楽キャリアを築いた都市でもある。"},
    {name:"フランクフルト総領事館",type:"総領事館",country:"ドイツ",note:"フランクフルトはドイツの金融の中心地で欧州中央銀行（ECB）の本部が置かれる。フランクフルト国際空港は欧州最大規模のハブ空港のひとつ。"},
    {name:"ミュンヘン総領事館",type:"総領事館",country:"ドイツ",note:"ミュンヘンはバイエルン州の州都でオクトーバーフェスト（世界最大のビール祭）の開催地。BMW・アリアンツなど大企業の本拠地でもある。"},
    {name:"ノルウェー大使館",type:"大使館",country:"",note:"ノルウェーは世界最大の政府系ファンド（政府年金基金）を持つ北欧の産油国。フィヨルドとオーロラの絶景で有名。"},
    {name:"ハンガリー大使館",type:"大使館",country:"",note:"ハンガリーはドナウ川沿いの内陸国。温泉大国で首都ブダペストは「ドナウの真珠」と呼ばれる美しい都市。"},
    {name:"フィンランド大使館",type:"大使館",country:"",note:"フィンランドはサウナ発祥の国でサンタクロースの故郷とされるロヴァニエミがある。教育水準が世界最高クラスの「教育大国」。"},
    {name:"フランス大使館",type:"大使館",country:"",note:"フランスは日本のファッション・美食・芸術に多大な影響を与えた国。ルーブル美術館・エッフェル塔・ヴェルサイユ宮殿が有名。"},
    {name:"ストラスブール総領事館",type:"総領事館",country:"フランス",note:"ストラスブールはアルザス地方の中心都市でフランスとドイツの文化が交差する欧州議会の所在地。"},
    {name:"マルセイユ総領事館",type:"総領事館",country:"フランス",note:"マルセイユはフランス第2の都市で地中海最大の港湾都市。フランス料理のブイヤベースの発祥地でもある。"},
    {name:"ブルガリア大使館",type:"大使館",country:"",note:"ブルガリアはバラの産地として有名で世界のローズオイルの主要生産国。キリル文字の発祥地でもある。"},
    {name:"ベラルーシ大使館",type:"大使館",country:"",note:"ベラルーシは「欧州最後の独裁国家」とも呼ばれる。チェルノブイリ原発事故（1986年）の影響を最も受けた国のひとつ。"},
    {name:"ベルギー大使館",type:"大使館",country:"",note:"ベルギーはEU本部・NATO本部が置かれる「欧州の首都」。チョコレート・ワッフル・フライドポテト（フリット）の本場。"},
    {name:"ポーランド大使館",type:"大使館",country:"",note:"ポーランドはショパン・キュリー夫人の故郷。旧ソ連圏で最大の経済規模を持ち、近年の経済成長が著しい。"},
    {name:"ボスニア・ヘルツェゴビナ大使館",type:"大使館",country:"",note:"ボスニア・ヘルツェゴビナは1990年代の内戦（ボスニア紛争）の舞台となった国。首都サラエボは第一次世界大戦の発端となった暗殺事件の地。"},
    {name:"ポルトガル大使館",type:"大使館",country:"",note:"ポルトガルは大航海時代の先駆者で1543年に種子島への鉄砲伝来、天文18年に日本と最初の接触を持った欧州国家。"},
    {name:"マルタ大使館",type:"大使館",country:"",note:"マルタは地中海の小島嶼国で世界最古の建造物（神殿）を持つ。英語が公用語で欧州の英語留学先として人気。"},
    {name:"モルドバ大使館",type:"大使館",country:"",note:"モルドバは欧州最貧国のひとつ。世界最大級の地下ワインセラーを持つワインの産地として知られる。"},
    {name:"ラトビア大使館",type:"大使館",country:"",note:"ラトビアはバルト三国のひとつ。首都リガはハンザ同盟都市として栄え、木造建築と新芸術様式（ユーゲントシュティール）建築の宝庫。"},
    {name:"リトアニア大使館",type:"大使館",country:"",note:"リトアニアはバルト三国最南部の国。第二次世界大戦中に杉原千畝副領事が「命のビザ」を発給し多くのユダヤ人を救った地。"},
    {name:"ルーマニア大使館",type:"大使館",country:"",note:"ルーマニアはドラキュラ伝説の舞台トランシルヴァニア地方を持つ国。体操・ゲオルゲ・エネスクなど芸術文化で有名。"},
    {name:"ルクセンブルク大使館",type:"大使館",country:"",note:"ルクセンブルクは一人あたりGDPが世界最高クラスの小国。EU機関が多数置かれ、国際金融センターとしても重要な役割を担う。"},
    {name:"ロシア大使館",type:"大使館",country:"",note:"ロシアは世界最大の面積を持つ国。北方領土問題で日本と領土問題が続いており、2022年のウクライナ侵攻後は関係が著しく悪化。"},
    {name:"エカテリンブルク総領事館",type:"総領事館",country:"ロシア",note:"エカテリンブルクはウラル山脈の東麓に位置するロシア第4の都市。ロシア最後の皇帝ニコライ2世一家が処刑された地としても知られる。"},
  ],
  "中東": [
    {name:"アラブ首長国連邦大使館",type:"大使館",country:"",note:"UAEは7つの首長国からなる連邦国家。石油収入を背景に超高層ビル・観光インフラを整備し「中東のハブ」として発展した。"},
    {name:"ドバイ総領事館",type:"総領事館",country:"UAE",note:"ドバイはUAEの経済の中心地。世界最高ビルのブルジュ・ハリファがあり、砂漠から世界屈指の都市に変貌を遂げた場所。"},
    {name:"イエメン大使館",type:"大使館",country:"",note:"イエメンは内戦が長期化する中東最貧国のひとつ。コーヒーのモカ（モカコーヒー）はイエメンのモカ港が由来。現在大使館は一時閉館中。"},
    {name:"イスラエル大使館",type:"大使館",country:"",note:"イスラエルは1948年建国のユダヤ人国家。「スタートアップ国家」として知られ、ICT・農業技術等で日本との協力が進む。"},

const REGIONS = Object.keys(data);

// Build flat array with region
let allItems = [];
REGIONS.forEach(r => data[r].forEach(m => allItems.push({...m, region: r})));

// ── localStorage: weak list ──
const LS_KEY = 'quiz_weak_list';
function loadWeak() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveWeak(obj) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch {}
}
// weak: { [name]: { wrong: N, correct: N } }
let weakMap = loadWeak();

function updateWeak(name, isCorrect) {
  if (!weakMap[name]) weakMap[name] = { wrong: 0, correct: 0 };
  if (isCorrect) weakMap[name].correct++;
  else weakMap[name].wrong++;
  // 正解3回連続で苦手リストから削除（連続正解チェックは簡略化：total正解がwrongの3倍以上）
  const w = weakMap[name];
  if (w.correct >= 3 && w.correct >= w.wrong * 3) delete weakMap[name];
  saveWeak(weakMap);
}

function getWeakItems() {
  return allItems.filter(m => weakMap[m.name]);
}

function updateWeakUI() {
  const cnt = Object.keys(weakMap).length;
  document.getElementById('weak-cnt').textContent = cnt;
  document.getElementById('weak-mode-btn').disabled = cnt === 0;
  const banner = document.getElementById('weak-banner');
  if (cnt > 0) {
    banner.style.display = 'block';
    banner.textContent = `📕 苦手リストに ${cnt} 件の公館があります`;
  } else {
    banner.style.display = 'none';
  }
}

// ── Region multi-select UI ──
const regionSelectCont = document.getElementById('region-select');
let selectedRegions = new Set(REGIONS);

REGIONS.forEach(r => {
  const label = document.createElement('label');
  label.className = 'region-chk checked';
  label.dataset.region = r;
  label.innerHTML = `<span class="chk-icon"></span>${r}<span class="cnt">${data[r].length}</span>`;
  label.addEventListener('click', () => {
    if (selectedRegions.has(r)) { selectedRegions.delete(r); label.classList.remove('checked'); }
    else { selectedRegions.add(r); label.classList.add('checked'); }
  });
  regionSelectCont.appendChild(label);
});

document.getElementById('sel-all').addEventListener('click', () => {
  REGIONS.forEach(r => selectedRegions.add(r));
  document.querySelectorAll('.region-chk').forEach(el => el.classList.add('checked'));
});
document.getElementById('sel-none').addEventListener('click', () => {
  selectedRegions.clear();
  document.querySelectorAll('.region-chk').forEach(el => el.classList.remove('checked'));
});

// State
let pool = [], questions = [], qIdx = 0;
let correctCount = 0, wrongCount = 0, streak = 0, maxStreak = 0;
let regionStats = {};
let answered = false;
let selectedCount = 20;
let hintUsed = false;
let wrongLog = []; // {name, chosen, correct}
let isWeakMode = false;

// Count buttons
document.querySelectorAll('.count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCount = parseInt(btn.dataset.count);
  });
});

document.getElementById('start-btn').addEventListener('click', () => startGame(false));
document.getElementById('weak-mode-btn').addEventListener('click', () => startGame(true));
document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  updateWeakUI();
});
document.getElementById('result-weak-btn').addEventListener('click', () => {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
  updateWeakUI();
  startGame(true);
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(weakMode) {
  isWeakMode = weakMode;
  let source;
  if (weakMode) {
    source = getWeakItems();
    if (source.length === 0) return;
  } else {
    if (selectedRegions.size === 0) {
      document.getElementById('start-error').style.display = 'block';
      return;
    }
    document.getElementById('start-error').style.display = 'none';
    source = allItems.filter(m => selectedRegions.has(m.region));
  }

  pool = shuffle(source);
  const cnt = selectedCount === 999 ? pool.length : Math.min(selectedCount, pool.length);
  questions = pool.slice(0, cnt);

  qIdx = 0; correctCount = 0; wrongCount = 0; streak = 0; maxStreak = 0;
  wrongLog = [];
  regionStats = {};
  REGIONS.forEach(r => regionStats[r] = { correct: 0, total: 0 });

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  hintUsed = false;
  const q = questions[qIdx];
  const total = questions.length;

  document.getElementById('q-mission').textContent = q.name;
  const typeEl = document.getElementById('q-type');
  typeEl.textContent = q.type;
  typeEl.className = 'q-type ' + q.type;

  // Hint
  const hintBtn = document.getElementById('hint-btn');
  const hintReveal = document.getElementById('hint-reveal');
  hintReveal.style.display = 'none';
  hintReveal.textContent = '';
  if (q.country) {
    hintBtn.style.display = 'inline-flex';
    hintBtn.disabled = false;
    hintBtn.textContent = '💡 ヒント（国名）';
    hintBtn.onclick = () => {
      if (hintUsed || answered) return;
      hintUsed = true;
      hintReveal.textContent = `🌍 ${q.country}`;
      hintReveal.style.display = 'inline-block';
      hintBtn.style.display = 'none';
    };
  } else {
    hintBtn.style.display = 'none';
  }

  // Memo panel: hide until answer
  document.getElementById('memo-panel').style.display = 'none';

  document.getElementById('s-correct').textContent = correctCount;
  document.getElementById('s-wrong').textContent = wrongCount;
  document.getElementById('s-num').textContent = `${qIdx + 1}/${total}`;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('progress-bar').style.width = `${(qIdx / total) * 100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('visible');

  const correct = q.region;
  const activeRegions = isWeakMode ? REGIONS : [...selectedRegions];
  const wrongPool = shuffle(activeRegions.filter(r => r !== correct));
  let wrongOpts = wrongPool.slice(0, 3);
  if (wrongOpts.length < 3) {
    const extra = shuffle(REGIONS.filter(r => r !== correct && !wrongOpts.includes(r)));
    wrongOpts = [...wrongOpts, ...extra].slice(0, 3);
  }
  const opts = shuffle([correct, ...wrongOpts]);

  const optsCont = document.getElementById('options');
  optsCont.innerHTML = '';
  opts.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = r;
    btn.addEventListener('click', () => selectAnswer(r, correct));
    optsCont.appendChild(btn);
  });
}

function selectAnswer(chosen, correct) {
  if (answered) return;
  answered = true;

  document.getElementById('hint-btn').style.display = 'none';

  const q = questions[qIdx];
  regionStats[correct].total++;

  const optBtns = document.querySelectorAll('.opt-btn');
  optBtns.forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === correct) btn.classList.add('correct-ans');
    if (btn.textContent === chosen && chosen !== correct) btn.classList.add('wrong-ans');
  });

  const isCorrect = chosen === correct;
  updateWeak(q.name, isCorrect);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    correctCount++;
    streak++;
    maxStreak = Math.max(maxStreak, streak);
    regionStats[correct].correct++;
    fb.textContent = streak >= 3 ? `🔥 正解！ ${streak}連続！` : '✅ 正解！';
    fb.className = 'feedback correct';
    if (streak >= 3) showStreakBadge(streak);
  } else {
    wrongCount++;
    streak = 0;
    wrongLog.push({ name: q.name, chosen, correct });
    fb.textContent = `❌ 不正解… 正解は「${correct}」でした`;
    fb.className = 'feedback wrong';
  }

  // 国名開示
  if (q.country) {
    const hintReveal = document.getElementById('hint-reveal');
    hintReveal.textContent = `🌍 ${q.country}`;
    hintReveal.style.display = 'inline-block';
  }

  // 豆知識メモ表示
  if (q.note) {
    document.getElementById('memo-text').textContent = q.note;
    document.getElementById('memo-panel').style.display = 'block';
  }

  document.getElementById('s-correct').textContent = correctCount;
  document.getElementById('s-wrong').textContent = wrongCount;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('next-btn').classList.add('visible');
}

function nextQuestion() {
  qIdx++;
  if (qIdx >= questions.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((correctCount / total) * 100);

  document.getElementById('r-score').textContent = correctCount;
  document.getElementById('r-total').textContent = total;

  const rankEl = document.getElementById('r-rank');
  let rank, comment;
  if (pct === 100)    { rank = '🏆 外務省レベル！'; rankEl.style.cssText = 'background:#d1fae5;color:#065f46;'; comment = '完璧です！在外公館を完全に把握していますね。'; }
  else if (pct >= 80) { rank = '🥇 外交官候補！'; rankEl.style.cssText = 'background:#fef3c7;color:#92400e;'; comment = `素晴らしい！最高連続正解は ${maxStreak} 問でした。`; }
  else if (pct >= 60) { rank = '🥈 地理マスター'; rankEl.style.cssText = 'background:#dbeafe;color:#1d4ed8;'; comment = `なかなか良いです！最高連続正解は ${maxStreak} 問でした。`; }
  else if (pct >= 40) { rank = '🥉 地理通'; rankEl.style.cssText = 'background:#ede9fe;color:#6d28d9;'; comment = '半分以上正解できました。もう一度挑戦してみましょう！'; }
  else                { rank = '📚 要勉強'; rankEl.style.cssText = 'background:#fee2e2;color:#dc2626;'; comment = '繰り返し挑戦して覚えましょう！'; }
  rankEl.textContent = rank;
  document.getElementById('r-comment').textContent = comment;

  // Region breakdown
  const bd = document.getElementById('r-breakdown');
  bd.innerHTML = '';
  REGIONS.forEach(r => {
    const s = regionStats[r];
    if (s.total === 0) return;
    const div = document.createElement('div');
    div.className = 'bd-item';
    const p = Math.round((s.correct / s.total) * 100);
    const col = p >= 80 ? 'var(--correct)' : p >= 50 ? 'var(--warn)' : 'var(--wrong)';
    div.innerHTML = `<div class="bd-region">${r}</div><div class="bd-score" style="color:${col}">${s.correct}/${s.total} <span style="font-size:11px;color:var(--text-muted)">(${p}%)</span></div>`;
    bd.appendChild(div);
  });

  // Wrong list
  const wrongListEl = document.getElementById('wrong-list');
  const wrongItemsEl = document.getElementById('wrong-items');
  wrongItemsEl.innerHTML = '';
  if (wrongLog.length > 0) {
    wrongListEl.style.display = 'block';
    wrongLog.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<span class="wi-name">${w.name}</span><span class="wi-ans">→ ${w.chosen}</span><span class="wi-correct">✓ ${w.correct}</span>`;
      wrongItemsEl.appendChild(div);
    });
  } else {
    wrongListEl.style.display = 'none';
  }

  // Weak mode re-challenge button
  const weakCnt = Object.keys(weakMap).length;
  const resultWeakBtn = document.getElementById('result-weak-btn');
  if (weakCnt > 0) {
    resultWeakBtn.style.display = 'block';
    document.getElementById('result-weak-cnt').textContent = weakCnt;
  } else {
    resultWeakBtn.style.display = 'none';
  }
}

function showStreakBadge(n) {
  const badge = document.getElementById('streak-badge');
  badge.textContent = `🔥 ${n}連続正解！`;
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

// Init
updateWeakUI();
</script>
</body>
</html>
